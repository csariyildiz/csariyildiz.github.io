---
layout: default2
---


<div class="content-area">
<main class="site-main">
<article class="post tag-web-development tag-blog-tag tag-jekyll tag-web-design tag-wordpress single-post" style="">
<header class="post-header big-title container medium" style="padding:1rem;padding-bottom: 0px;">
<h1 class="post-title" style="font-family: Mulish,sans-serif;font-size: 28px;font-weight: 800;letter-spacing: -.5px;line-height: 1.3;margin: 0 0 15px;word-break: break-word;">Archive</h1>
<div class="post-meta" style="color: #aaa; font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; ">
<span class="post-meta-item post-meta-date">
<time datetime="24-05-2023">
 24-05-2023
</time>
</span>
<span class="post-meta-item post-meta-length">
1 min read
 </span>
 
<span class="post-meta-item post-meta-tags">
    <a class="post-tag post-tag-web-development" href="#" style="color: #00bbff; text-decoration: none;">
      Software
    </a>
  

 
 </span>
</div>
</header>

	
<hr>

  <div class="list-group w-auto">
	   {% for post in site.posts %}  {% if post.url %}  
  <a href="{{ post.url }}" class="list-group-item list-group-item-action d-flex gap-3 py-3" aria-current="true">
  
    <div class="d-flex gap-2 w-100 justify-content-between">
      <div>
        <h6 class="mb-0">{{ post.title }}</h6>
  
      </div>
      <small class="opacity-50 text-nowrap">{{ post.date }}"</small>
    </div>
  </a>
	   {% endif %}
          {% endfor %}
</div>

       </div>
          </article>
  </main>
