---
layout: default2
---


<div class="content-area">
	
<main class="site-main">
<article class="post tag-web-development tag-blog-tag tag-jekyll tag-web-design tag-wordpress single-post" style="">
<header class="post-header big-title container medium" style="padding:1rem;padding-bottom: 0px;">	
<h1 class="post-title" style="font-family: Mulish,sans-serif;font-size: 28px;font-weight: 800;letter-spacing: -.5px;line-height: 1.3;margin: 0 0 15px;word-break: break-word;">Archive</h1>
</header>

<div style=" padding: 1rem; padding-top: 0rem; "> 
	<table class="table">
		
  <thead class="thead-dark">
    <tr>
      <th style="color: #fff; background-color: #212529; border-color: #32383e;" scope="col">Category</th>
      <th style="color: #fff; background-color: #212529; border-color: #32383e;"  scope="col">Tag</th>
      <th style="color: #fff; background-color: #212529; border-color: #32383e;"  scope="col">Date</th>
      <th style="color: #fff; background-color: #212529; border-color: #32383e;"  scope="col">Title</th>
    </tr>
  </thead>
  <tbody>
	  
	{% for post in site.posts %}  {% if post.url %} 
	
    <tr>
      <td style="font-size: 11px; color: #aaa; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; ">{{post.category}}</td>
      <td style="font-size: 11px; color: #aaa; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;">{% if post.tags %} {% for tag in post.tags %} <a> {{ tag }} </a> {% endfor %} {% else %} <a></a> {% endif %}</td>
      <td style="font-size: 11px; color: #aaa; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;">{{ post.date | date: "%d-%m-%Y"}}</td>
      <td style="font-size: 11px; color: #aaa; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; "><a href="{{ post.url }}" style="text-decoration: none; color: black;">{{ post.title }}</a></td>
	    
    </tr>

	

	
	
	{% endif %} {% endfor %} 
		
		</tbody>
</table>
</div>
	
	
	

          </article>
	
	
  </main>

 </div>
