---
layout: default2
---

<div style="margin-left: 16px !important;">
<header class="post-header big-title container medium" style="padding:1rem;padding-bottom: 0px;">
<h1 class="post-title" style="font-family: Mulish,sans-serif;font-size: 28px;font-weight: 800;letter-spacing: -.5px;line-height: 1.3;margin: 0 0 15px;word-break: break-word;">Archive:</h1>

</header>

<div class="container list-group" style="margin-top: 1rem;">
{% for post in site.posts %}  {% if post.url %} 
  <a href="{{ post.url }}" class="row list-group-item list-group-item-action p-3" aria-current="true" style="margin:0px;padding-right: 0px !important;border: 0px;border-top: 1px solid #ced4da !important;border-radius: 0px;padding-left: 0px !important;padding-bottom: 10px !important; padding-top: 10px !important;">
	  <div class="col-9 col-md-12" style="padding-right: 0px;">
        	<h6 class="mb-0" style="">{{ post.date | date: "%d-%m-%Y"}} - {{ post.title }}</h6>
	 </div>
  </a>
   {% endif %} {% endfor %} 
</div>
	
</div>
