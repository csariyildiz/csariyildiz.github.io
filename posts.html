---
layout: page
title: "Posts:"
---


  <table class="table table-borderless">
  
  <tbody>
	
	 {% for post in site.categories.main %}  {% if post.url %}
	
	
    <tr>
      
      <td><a href="{{ post.url }}" style="color: #212529; text-decoration: none; font-size: 1.25rem; font-weight: bold;line-height: 1.5; font-family: var(--bs-font-sans-serif); ">{{ post.date | date: "%d-%m-%Y"}} {{ post.title }}</a></td>
      
    </tr>

	   {% endif %}
          {% endfor %}

  </tbody>
</table>
