                        <div class="d-flex flex-wrap">

                                <img src="/assets/img/csariyildiz_github_io_s.png" "="" alt="csariyildiz.github.io" width="30" height="40" style="margin-right: 10px;width: 43px;margin-top: 0px;margin-bottom: 0px;">
                                <div class="" style="font-weight: bold;float: left;padding-bottom: 10px;font-size: 32px;">Çağrı Sarıyıldız</div>
                            </a>
                            <nav class="navbar navbar-expand-lg navbar-light" style=" padding-top: 0px; padding-bottom: 0px; height: 40px !important; ">
                                <div class="container-fluid" style=" padding-right: 0px; ">
                                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                                        <span class="navbar-toggler-icon"></span>
                                    </button>
                                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                                            <li class="nav-item"><a class="nav-link active" aria-current="blog" href="posts">Posts</a></li>

<header class="post-header big-title container medium" style="padding:1rem;padding-top: 2.0rem;padding-left: 0px;padding-bottom: 1.5rem;">
  <h1 class="post-title" style="font-family: Mulish,sans-serif;font-weight: 800;letter-spacing: -.5px;line-height: 1.3;margin: 0 0 15px;word-break: break-word;">Posts</h1>

  </header>

<div class="post-body">

    
  <table class="table table-borderless">
  
  <tbody>

	
	 {% for post in site.categories.main %}  {% if post.url %}
	
	
    <tr>
      
      <td><a href="{{ post.url }}" style="">{{ post.date | date: "%d-%m-%Y"}} {{ post.title }}</a></td>
      
    </tr>

	   {% endif %}
          {% endfor %}

  </tbody>
</table>
	 
</div>

</div>
