<!DOCTYPE html>
<html lang="en" class="h-100 w-100">
<head>

    <link rel="canonical" href="https://csariyildiz.github.io">
    <!-- Bootstrap core CSS -->
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Favicons -->
    <link rel="apple-touch-icon" href="/assets/img/favicon/apple-touch-icon.png" sizes="180x180">
    <link rel="icon" href="/assets/img/favicon/favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/assets/img/favicon/favicon-16x16.png" sizes="16x16" type="image/png">
    <link rel="manifest" href="/assets/img/favicon/manifest.json">
    <link rel="mask-icon" href="/assets/img/favicon/safari-pinned-tab.svg" color="#7952b3">
    <link rel="icon" href="/assets/img/favicon/favicon.ico">
    <meta name="theme-color" content="#7952b3">
    <style>
        body {
            text-shadow: 0 .05rem .1rem rgba(0, 0, 0, .5);
            box-shadow: inset 0 0 5rem rgba(0, 0, 0, .5);
        }

        .bd-placeholder-img {
            font-size: 1.125rem;
            text-anchor: middle;
            user-select: none;
        }

        @media (min-width: 768px) {
            .bd-placeholder-img-lg {
                font-size: 3.5rem;
            }
        }

        /* Custom styles */
        .bg-dark-custom {
            background: black;
        }

        .container-custom {
            max-width: 80em;
        }

        .main-custom {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        .text-left-custom {
            text-align: left;
        }

        .h1-custom {
            font-size: 4em;
            padding-top: 2.4rem;
        }

        .p-location {
            font-size: 1.5em;
            margin-top: 1.313rem;
        }

        .ul-custom {
            list-style-type: none;
            font-size: 2em;
            margin-top: 2rem;
            margin-bottom: 2rem;
            padding-left: 0;
        }

        .ul-custom li {
            margin-top: 10px;
        }

        .footer-info {
            display: flex;
            padding-left: 10px;
            margin-top: 3.236rem;
            margin-bottom: 3rem;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }

        .footer-info div {
            margin-left: 10px;
        }

        .footer-info a {
            text-decoration: underline;
            color: inherit;
        }

        .img-fluid-custom {
            width: 100%;
        }

        .cover-container {
            max-width: 42em;
        }

        .nav-masthead .nav-link {
            padding: .25rem 0;
            font-weight: 700;
            color: rgba(255, 255, 255, .5);
            background-color: transparent;
            border-bottom: .25rem solid transparent;
        }

        .nav-masthead .nav-link:hover,
        .nav-masthead .nav-link:focus {
            border-bottom-color: rgba(255, 255, 255, .25);
        }

        .nav-masthead .nav-link + .nav-link {
            margin-left: 1rem;
        }

        .nav-masthead .active {
            color: #fff;
            border-bottom-color: #fff;
        }
    </style>
</head>
<body class="d-flex text-white bg-dark h-100 w-100 bg-dark-custom">
    <div class="container p-3 d-flex flex-column mx-auto container-custom">
        <main class="px-3 main-custom">
            <div class="container">
                <div class="row">
                    <div class="col-md-6 col-12 text-left-custom">
                        <div class="p-md-4 p-2">
                            <h1 class="h1-custom">Hi, I'm Çağrı!</h1>
                            <p class="p-location">📍 Istanbul, Turkiye</p>
                            <p>I research and write about various topics including cybersecurity, programming, and system administration.</p>
                            <ul class="ul-custom">
                                <li><a href="/blog" style="color: inherit; text-decoration: none;">Blog</a></li>
                            </ul>
                            <div class="footer-info">
                                <div>csariyildiz.github.io</div>
                                <div>•</div>
                                <div>2024</div>
                                <div>•</div>
                                <div><a href="https://www.linkedin.com/in/acsariyildiz">LinkedIn</a></div>
                                <div>•</div>
                                <div><a href="https://medium.com/@acsariyildiz">Medium</a></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-12">
                        <img src="/img/flow1.png" class="img-fluid img-fluid-custom" alt="...">
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
