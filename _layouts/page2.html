    <style>
            pre, figure, code { margin: 0; }
            img {
                max-width: 100%;
                height: auto;
                margin: 0 auto;
                display: block;
				width: 100%;
				margin-top: 2em;
				margin-bottom: 2em;
            }
    
            body, .pure-g[class*="pure-u"] {

            }
    
            body {
                line-height: 1.5em;
                color: #222;
            }
    
            body * {
                box-sizing: border-box;
            }
    
            code {
                background-color: #FAFAFA;
                border: 1px solid #EDEDED;
                border-radius: 3px;
                padding: 0 0.4em;
                font-size: 0.9em;
                font-family:
                    "Hack",
                    "Source Code Pro",
                    Consolas,
                    "Liberation Mono",
                    Menlo,
                    Courier,
                    monospace;
            }
    
            pre {
                background-color: #FAFAFA;
            }
    
            pre > code {
               
                border: 0;
                border-radius: 0;
                
                display: inline-block;
                tab-size: 4;
                border-radius: 0;
                text-align: left;
                min-width: 100%;
            }
    
            pre {
                display: block;
                width: auto;
                overflow-x: auto;
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                white-space: pre;
                word-wrap: normal;
            }
    
            pre code {
                white-space: inherit;
            }
    
            a {
                color: #0088cc;
                text-decoration: none;
            }
    
            a:hover,
            a:focus {
                color: #005580;
                text-decoration: underline;
            }
    
   
    
            h1 {
                padding-bottom: 0.75em;
            }
    
            h2,h3 {
           padding-bottom: 0.3em;
    border-bottom: 1px solid #d8dee4;
    border-top: none;
    margin-top: 24px !important;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
    margin-block-start: 0.83em;
    margin-block-end: 0.83em;
    margin-inline-start: 0px;
    margin-inline-end: 0px;
    font-size: 1.5rem;
            }

	        h3 {
  border-bottom: none;

    font-size: 1.25rem
            }
    
            small {
                color: #777;
            }
    
            .post-container h1 {
                margin-bottom: 0;
                padding-bottom: 0.1em;
            }
    
            .postlist-post {
                margin-bottom: 2.0em;
            }
    
            .gist-meta a{color:#0088cc !important;text-decoration:none}
            .gist-meta a:hover{color:#005580 !important}
    
            .nav {
                margin: 0.5em 1em 0 1em;
            }
    
            .content {
                padding: 0.5em 1em 2em 1em;
            }
    
            .post-date {
                display: inline-block;
                margin-bottom: 1em;
                padding-right: 1em;
            }
            .post-tag {
                padding: 0.2em 0.6em;
                background-color: #EFEFEF;
                margin-right: 10px;
            }
    
            .post-body {
                word-break: break-word;
            }
    
            .top-tag {
                padding: 0;
                margin: 0;
                position: relative;
                top: -30px;
            }
    
            .leftnav {
                width: 64px;
                height: 5000px;
                position: fixed;
                padding-left: 7px;
                top: 0;
                z-index: 9000;
                left: 0px;
                -webkit-transition: all 0.3s ease;
                -moz-transition: all 0.3s ease;
                -ms-transition: all 0.3s ease;
                -o-transition: all 0.3s ease;
                transition: all 0.3s ease;
            }
            .leftnav * {
                -webkit-transition: all 0.3s ease;
                -moz-transition: all 0.3s ease;
                -ms-transition: all 0.3s ease;
                -o-transition: all 0.3s ease;
                transition: all 0.3s ease;
            }
            .leftnav .logo img {
                -webkit-transition: all 0.1s ease;
                -moz-transition: all 0.1s ease;
                -ms-transition: all 0.1s ease;
                -o-transition: all 0.1s ease;
                transition: all 0.1s ease;
            }
            .leftnav a {
                display: block;
                text-decoration: none;
            }
    
            .logo {
                margin: 15px 0;
                width: 43px;
                height: 67px;
            }
            .logo img {
              
            }
            .leftnav i {
                font-size: 39px;
                display: block;
                visibility: visible;
                padding-bottom: 0.2em;
                color: #DDD;
            }
            .leftnav i:hover {
                color: #777;
            }
    
            .logo img:hover {
                box-shadow: 0 0 0 3px #777;
            }
    
            em {
                background-color: rgb(250, 250, 210);
                font-style: normal;
            }
    
            .content, .leftnav {
                max-width: 45em;
                margin: 0 auto;
            }
    
            @media (max-width: 70em) {
                .leftnav {
                    height: auto;
                    width: inherit;
                    position: static;
                    top: auto;
                    left: auto;
                    z-index: auto;
                }
                .leftnav a, .leftnav i {
                    display: inline-block;
                    vertical-align: middle;
                }
                .leftnav i {
                    padding-left: 0.3em;
                    padding-bottom: 0;
                    vertical-align: bottom;
                }
                .logo {
                    margin: 7px 0;
                }
            }
    
            @media (min-width: 40em) {
                body {
                    font-size: 1.1em;
                }
            }
    
            .margintop {
                margin-top: 3em;
            }
    
			.img-fluid {
			width: auto;
			margin: unset;
			}
    
            @media print {
                *,
                *:before,
                *:after,
                *:first-letter,
                *:first-line {
                    background: transparent !important;
                    color: #000 !important;
                    box-shadow: none !important;
                    text-shadow: none !important;
                }
    
                a,
                a:visited {
                    text-decoration: underline;
                }
    
                abbr[title]:after {
                    content: " (" attr(title) ")";
                }
    
                a[href^="#"]:after,
                a[href^="javascript:"]:after {
                    content: "";
                }
    
                pre,
                blockquote {
                    page-break-inside: avoid;
                }
    
                thead {
                    display: table-header-group;
                }
    
                tr,
                img {
                    page-break-inside: avoid;
                }
    
                img {
                    max-width: 100% !important;
                }
    
                p,
                h2,
                h3 {
                    orphans: 3;
                    widows: 3;
                }
    
                h2,
                h3 {
                    page-break-after: avoid;
                }
            }

	    .post-container{
    min-width: 756px;
	    }
		.post-body{
			font-size:15px;
		}
	    
	    .highlight{
		    border: 1px solid #d8dee4;}
	    
        </style>
