---
layout: page2
---

<div class="post-container">
<h1>{{ page.title | escape }}</h1>
<small class="post-date">{{ post.date | date: "%B %d, %Y" }}</small>
{% if page.tags %}
  {% for tag in page.tags %}
  <small><a href="/tags/#{{ tag }}" class="post-tag">{{ tag }}</a></small>
  {% endfor %}
{% else %}
 
{% endif %}

<div class="post-body">

     {{ content }}
	 
</div>



</div>
