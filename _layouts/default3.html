<!doctype html>
<html lang="en">
  {% include head.html %}
     <style>
      /* Set a fixed height for the navbar */
      .navbar {
        height: 60px;
      }
      /* Set a fixed height for the sidebar */
      #sidebar {
        height: calc(100vh - 60px);
      }
      /* Set the active link in the sidebar */
      .sidebar .nav-link.active {
        font-weight: 600;
      }
      /* Set the transition for the sidebar */
      .sidebar {
        transition: all 0.3s ease;
        overflow-y: auto;
      }
      /* Set the width of the sidebar */
      .sidebar-collapsed {
        width: 60px;
      }
      .sidebar-expanded {
        width: 250px;
      }
      /* Set the margin of the main content area */
      #main-content {
        margin-left: 250px;
        transition: all 0.3s ease;
      }
      /* Set the margin of the main content area when the sidebar is collapsed */
      .sidebar-collapsed #main-content {
        margin-left: 60px;
      }
    </style>
<body cz-shortcut-listen="true">
   <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar" aria-controls="sidebar" aria-expanded="false" aria-label="Toggle sidebar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="#">My Document</a>
        <button class="btn btn-primary">Save</button>
      </div>
    </nav>
    <!-- Sidebar -->
    <div class="sidebar sidebar-collapsed bg-light" id="sidebar">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="#">Chapter 1</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Chapter 2</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Chapter 3</a>
        </li>
      </ul>
    </div>
    <!-- Main content area -->
    <div id="main-content">
      <div class="container-fluid mt-3">
        <h1>Chapter 1</h1>
        <p>Lorem ipsum dolor sit amet.</p>
      </div>
    </div>
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
  
      <script>
      // Toggle the sidebar
      document.querySelector('.navbar-toggler').addEventListener('click', function() {
        document.querySelector('#sidebar').classList.toggle('sidebar-collapsed');
        document.querySelector('#sidebar').classList.toggle('sidebar-expanded');
        document.querySelector('#main-content').classList.toggle('sidebar-collapsed');
      });
    </script>
  
  </body>
</html>
