---
layout: default2
---
<div>
  <div class="row">
    <div>
  <nav aria-label="breadcrumb">
  <ol class="breadcrumb" style="float:left;color: #aaa;font-size: 0.7rem;font-weight: 800;letter-spacing: .5px;text-transform: uppercase;">
    <li class="breadcrumb-item"><a href="index" style=" color: black; text-decoration: none; ">Index</a></li>
    <li class="breadcrumb-item" aria-current="page">Category</li>
  
  </ol>
    <div style=" display: flex; float: right; ">
        <small class="content-meta">
          <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished" style="float:left;color: #aaa;font-size: 0.7rem;font-weight: 800;letter-spacing: .5px;text-transform: uppercase;">
           {{ page.date | date: "%d-%m-%Y" }}
          </time>
        </small>
    </div>
    </div>
</nav>
    
  </div>

  <div class="row">

             <article class="content" itemscope itemtype="http://schema.org/BlogPosting" style="">
   <div class="article-head mt-2 mb-2" style="padding: 2rem;padding-bottom:0rem;padding-left: 0px;padding-top: 0rem;">
           <h2 style=" font-family: Muli,sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -.5px; line-height: 1.3; margin: 0 0 15px; ">{{ page.title | escape }}</h2>
           </div>     
           
       <div class="mt-3 mb-3" style="padding:2rem;padding-top:0rem;padding-left: 0px;">
     {{ content }}
       </div>
          </article>
  </div>

</div>
