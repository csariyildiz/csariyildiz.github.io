layout: default2

  <nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="#">About</a></li>
    <li class="breadcrumb-item" aria-current="page">Categories</li>
      <li class="breadcrumb-item" aria-current="page">Tags</li>
    <li class="breadcrumb-item" aria-current="page">Turkish</li>
  
  </ol>
</nav>


             <article class="content" itemscope itemtype="http://schema.org/BlogPosting" style="">
   <div class="article-head mt-2 mb-2" style="padding: 2rem;padding-bottom:0rem;padding-left: 0px;padding-top: 0rem;">
           <h1>{{ page.title | escape }}</h1>
       <small class="content-meta">
          <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
           {{ page.date | date: "%B %d, %Y" }}
          </time>
        </small>
           <hr/>
           </div>     
           
       <div class="mt-3 mb-3" style="padding:2rem;padding-top:0rem;padding-left: 0px;">
     {{ content }}
       </div>
          </article>
