---
layout: default2
---
<div class="content-area">
<main class="site-main">
             <article class="post tag-web-development tag-blog-tag tag-jekyll tag-web-design tag-wordpress single-post" style="">
               
               
               <header class="post-header big-title container medium" style="max-width: calc(750px + 8vw);text-align: center;margin-bottom: 20px;padding-left: 70px;padding-right: 70px;">
<h1 class="post-title" style="font-family: Mulish,sans-serif;font-size: 28px;font-weight: 800;letter-spacing: -.5px;line-height: 1.3;margin: 0 0 15px;word-break: break-word;">{{ page.title | escape }}</h1>
<div class="post-meta" style=" color: #aaa; font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; ">
<span class="post-meta-item post-meta-date">
<time datetime="2021-01-10">
 {{ page.date | date: "%d-%m-%Y" }}
</time>
</span>
<span class="post-meta-item post-meta-length">
5 min read
</span>
<span class="post-meta-item post-meta-tags">
<a class="post-tag post-tag-web-development" href="#" style=" color: #00bbff; text-decoration: none; " title="Category">Category</a>
</span>
</div>
</header>
                
           
       <div class="post-content kg-canvas u-text-format" style=" padding-left: 70px; padding-right: 70px; ">
     {{ content }}
       </div>
          </article>
  
  </main>
</div>
