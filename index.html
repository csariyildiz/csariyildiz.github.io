---
layout: default
---

<div class="container mb-4" style="padding:12px;margin: 12px;border: 1px solid #dee2e6;">
	<p>Latest Posts</p>
  
  <ul class="list-group">
    
    {% for post in site.categories.main %}
            {% if post.url %}  
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <a href="{{ post.url }}" style="text-decoration: none; color: black; "> {{ post.title }}</a>
  </li>

          {% endif %}
          {% endfor %}
    
    
</ul>
  

	  
    </div>
