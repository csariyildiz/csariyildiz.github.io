layout: default
---

<div class="container" style="">
	    

  
  
  <ul class="list-group" style="
    margin: 12px;
">
    
  
    {% for post in site.categories.main %}
            {% if post.url %}
    
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <a href="{{ post.url }}"> {{ post.title }}</a>
    <span class="badge bg-primary rounded-pill">2022-05-28</span>
  </li>

          {% endif %}
          {% endfor %}
    
    
</ul>
  

	  
    </div>

<div class="container" style="">
	

  <div class="panel panel-primary mt-3 mb-4" style="border: 1px solid #E5E9EF;border-radius: 5px;padding-left: 0px;padding-right: 0px;margin:12px;">
   
        <div class="panel-heading">Latest posts</div>

          {% for post in site.categories.main %}
            {% if post.url %}
       
               <a href="{{ post.url }}" class="list-group-item pjaxlink clearfix lista">
                  {{ post.title }}
                    <span class="badge">2022-05-28</span>
                  </a>

            {% endif %}
          {% endfor %}
    


</div>
