<ul class="list-group">
{% for post in site.categories.main %}  {% if post.url %}
<li class="list-group-item">
<a href="{{ post.url }}" style="color: #fff; text-decoration: none;">
	{{ post.date | date: "%d-%m-%Y" }} {{ post.title }}</a>
</li>
{% endif %}
{% endfor %}
</ul>
