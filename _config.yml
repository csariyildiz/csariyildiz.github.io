title: Çağrı Sarıyıldız
author: Çağrı Sarıyıldız
baseurl: ""
url: "https://csariyildiz.github.io"

markdown: kramdown

kramdown:
  input: GFM
  auto_ids: true
  toc_levels: 1..3
  
# Pagination & permalink
paginate: 5
permalink: /:year-:month-:day-:title/

# Defaults for posts and pages
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

collections:
  pages:
    output: true
    permalink: /:collection/:name/
    
# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
