---
layout: default5
---


  <table class="table table-borderless table-dark">
  
  <tbody>
    <tr>
      
      <td style="padding-left: 0px;"><h3>Posts</h3></td>
      
      
    </tr>
	
	 {% for post in site.categories.main %}  {% if post.url %}
	
	
    <tr>
      
      <td><a href="#" style=" color: #fff; text-decoration: none; font-size: 1.25rem; font-weight: 300; text-shadow: 0 0.05rem 0.1rem rgba(0, 0, 0, .5); line-height: 1.5; font-family: var(--bs-font-sans-serif); ">{{ post.date | date: "%d-%m-%Y"}} {{ post.title }}</a></td>
      
    </tr>

	   {% endif %}
          {% endfor %}

  </tbody>
</table>
