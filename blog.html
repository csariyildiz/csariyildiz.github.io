---
layout: default5
page_name: blog
---

<h3>Posts:</h3>

  <table class="table table-borderless table-dark">
    <thead>
      <tr>
        <th>Date</th>
        <th>Post</th>
        <th>Category</th>
      </tr>
    </thead>

  <tbody>

	 {% for post in site.categories.main %}  {% if post.url %}
	
    <tr>
      <td>
        <a href="{{ post.url }}" style="color: #fff; text-decoration: none;">{{ post.date }}</a>
      </td>
      <td>
        <a href="{{ post.url }}" style="color: #fff; text-decoration: none;">{{ post.title }}</a>
      </td>
      <td>
        <a href="{{ post.url }}" style="color: #fff; text-decoration: none;">{{ post.cat }}</a>
      </td>
      
    </tr>

	   {% endif %}
          {% endfor %}

  </tbody>
</table>
